# FloraOS build configuration.
# Sourced directly (plain shell KEY=VALUE) by scripts/build-rootfs.sh and
# scripts/build-iso.sh. Edit this file -- there is no other config format.
# Every value below is the default; a first-time clone needs no changes.

# Hostname baked into the built rootfs (/etc/hostname, /etc/os-release).
HOSTNAME=floraos

# Extra packages to build/install in addition to the mandatory base set
# (linux-lts glibc sysvinit openrc bash coreutils util-linux e2fsprogs
# iproute2 dhcpcd -- see docs/MANIFEST.md). Space-separated; each name needs
# a matching scripts/recipes/<name>.sh and an entry in config/versions.conf.
EXTRA_PACKAGES=""

# Kernel version to build. Must match the version pinned for "linux-lts" in
# config/versions.conf -- bump both together to change kernel version.
KERNEL_VERSION=6.18.38

# Filename for the built ISO (written to the repo root by build-iso.sh).
ISO_NAME=floraos.iso
